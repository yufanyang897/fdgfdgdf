<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-title" content="提词器">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
<link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="./screenshots/launch.png">
<link rel="mask-icon" href="./icons/icon.svg" color="#ffcc00">

<title>智能提词器</title>
<style>
  :root {
    --bg: #000;
    --text: #fff;
    --text-current: #ffcc00;
    --text-spoken: #888;
    --control-bg: rgba(30,30,30,0.95);
    --accent: #ffcc00;
    --accent2: #ff4444;
    --slider-track: #444;
    --safe-bottom: env(safe-area-inset-bottom, 16px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
  }

  /* ============ 提词器显示区 ============ */
  #prompter-view {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #prompter-view.mirror {
    transform: scaleX(-1);
  }

  /* 相机背景层（录制模式） */
  #camera-bg {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    background: #000;
  }
  #camera-bg video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transform: scaleX(-1); /* 前置镜像 */
  }
  #prompter-view.recording #camera-bg {
    display: block;
  }

  /* 文本叠加层 */
  #text-overlay {
    position: relative;
    z-index: 2;
    width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 录制模式：绝对定位 + 可拖拽 */
  #text-overlay.draggable {
    position: absolute;
    cursor: grab;
    touch-action: none;
    /* left/top/width 由 JS 动态设置 */
  }
  #text-overlay.draggable:active {
    cursor: grabbing;
  }
  #text-overlay.dragging {
    cursor: grabbing;
  }

  #prompter-text {
    width: 100%;
    max-height: 100%;
    font-size: var(--font-size, 42px);
    line-height: var(--line-height, 1.6);
    font-weight: 700;
    letter-spacing: 0.02em;
    text-align: center;
    word-break: break-word;
    transition: transform 0.1s linear;
    will-change: transform;
    text-shadow: 0 0 0 transparent;
    padding: 16px 8px;
    border-radius: 12px;
  }

  /* 录制模式下的文字背景框 */
  #prompter-view.recording #prompter-text {
    background: var(--overlay-bg, rgba(0,0,0,0.55));
    padding: 20px 12px;
  }

  /* 每个词 */
  .word {
    display: inline;
    transition: color 0.25s ease, opacity 0.25s ease;
    color: var(--text);
    opacity: 0.45;
  }
  .word.current {
    color: var(--text-current);
    opacity: 1;
    text-shadow: 0 0 24px rgba(255,204,0,0.5);
  }
  .word.spoken {
    color: var(--text-spoken);
    opacity: 0.3;
  }
  .word.pre-read {
    color: var(--text);
    opacity: 0.8;
  }

  /* 录制模式下文字颜色调整 */
  #prompter-view.recording .word.current {
    text-shadow: 0 0 18px rgba(255,204,0,0.9), 0 0 4px rgba(0,0,0,0.8);
  }

  /* ============ 小摄像头圆窗（非录制模式） ============ */
  #camera-wrap {
    display: none;
    position: absolute;
    top: max(12px, var(--safe-top));
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 20;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    background: #000;
  }
  #camera-wrap.on { display: block; }
  #camera-wrap video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #camera-border {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    pointer-events: none;
  }
  #rec-dot {
    display: none;
    position: absolute;
    top: 8px; right: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff3b30;
    box-shadow: 0 0 6px #ff3b30;
    animation: recPulse 1s ease-in-out infinite;
  }
  #rec-dot.active { display: block; }
  @keyframes recPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #prompter-view.has-camera #prompter-text {
    padding-top: 110px;
  }
  #rec-timer {
    display: none;
    color: #ff3b30;
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  #rec-timer.show { display: inline; }

  /* ============ 录制叠加设置面板 ============ */
  #overlay-settings {
    display: none;
    padding: 6px 16px;
    background: rgba(20,20,20,0.95);
    border-top: 1px solid #333;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  #overlay-settings.on { display: flex; }

  #overlay-settings .setting-label {
    font-size: 10px;
    color: #999;
    white-space: nowrap;
  }
  #overlay-settings .setting-val {
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    min-width: 24px;
    text-align: center;
  }

  .pos-btns {
    display: flex;
    gap: 2px;
  }
  .pos-btns button {
    min-height: 26px;
    padding: 2px 6px;
    font-size: 10px;
    border-radius: 5px;
    background: #333;
    color: #fff;
    border: none;
  }
  .pos-btns button.active {
    background: var(--accent);
    color: #000;
  }

  /* 颜色按钮 */
  .color-btns {
    display: flex;
    gap: 3px;
  }
  .color-btns button {
    min-height: 26px;
    padding: 2px 8px;
    font-size: 10px;
    border-radius: 5px;
    border: 1px solid #555;
  }
  .color-btns button.active {
    border-color: var(--accent);
    box-shadow: 0 0 6px rgba(255,204,0,0.4);
  }

  /* 隐藏文件输入 */
  #file-input {
    display: none;
  }

  /* ============ 脚本编辑面板 ============ */
  #editor-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-top: max(16px, var(--safe-top));
    padding-bottom: var(--safe-bottom);
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #editor-panel.open { transform: translateY(0); }

  #script-editor {
    flex: 1;
    width: 100%;
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    line-height: 1.8;
    resize: none;
    -webkit-user-select: text;
    user-select: text;
    font-family: inherit;
  }
  #editor-panel .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  #editor-panel .btn-row button { flex: 1; }

  /* ============ 底部控制栏 ============ */
  #controls {
    background: var(--control-bg);
    padding: 8px 12px calc(8px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .btn-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  button {
    background: #333;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    min-height: 42px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.96); }
  button.primary { background: var(--accent); color: #000; font-size: 15px; flex: 1; }
  button.danger { background: var(--accent2); }
  button.icon-btn { width: 40px; min-width: 40px; padding: 0; font-size: 18px; border-radius: 50%; }
  button.active { background: var(--accent); color: #000; }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    font-size: 12px;
    color: #aaa;
    min-width: 0;
  }
  .slider-group label { white-space: nowrap; font-size: 12px; min-width: 28px; }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--slider-track);
    outline: none;
    min-width: 30px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  .speed-val, .setting-val {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    min-width: 28px;
    text-align: center;
  }

  /* ============ 状态栏 ============ */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    background: #111;
    font-size: 11px;
    color: #888;
    min-height: 24px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .status-dot.listening { background: #0f0; animation: pulse 0.8s ease-in-out infinite; }
  .status-dot.speaking { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  @keyframes pulse {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.6); }
  }
  #interim-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 10px;
    color: #666;
    min-width: 0;
  }

  /* ============ 画中画备用（桌面端） ============ */
  #pip-canvas { display: none; }
  #pip-video { display: none; }

  /* ============ 全屏录制模式 ============ */
  body.recording-fullscreen #status-bar,
  body.recording-fullscreen #controls {
    display: none !important;
  }
  body.recording-fullscreen #prompter-view {
    height: 100vh;
  }
  /* 设置面板浮在相机底部 */
  body.recording-fullscreen #overlay-settings {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 30;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 4px 12px calc(4px + var(--safe-bottom));
  }

  /* ============ 响应式 ============ */
  @media (max-width: 400px) {
    #prompter-text { --font-size: 32px; }
    button { padding: 8px 10px; font-size: 12px; min-height: 36px; }
    button.icon-btn { width: 36px; min-width: 36px; }
  }
  @media (min-width: 768px) {
    #prompter-text { --font-size: 56px; }
  }
  @media (max-width: 850px) and (orientation: landscape) {
    #prompter-text { --font-size: 26px; line-height: 1.4; }
    #controls { padding: 4px 10px calc(4px + var(--safe-bottom)); gap: 4px; }
    button { min-height: 30px; padding: 4px 8px; font-size: 11px; }
    #status-bar { min-height: 20px; font-size: 10px; padding: 2px 10px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- 状态栏 -->
  <div id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-label">就绪</span>
    <span id="rec-timer"></span>
    <span id="interim-text"></span>
    <span id="position-info"></span>
  </div>

  <!-- 提词器显示 -->
  <div id="prompter-view">
    <!-- 全屏相机背景（录制模式） -->
    <div id="camera-bg">
      <video id="camera-video-bg" autoplay playsinline muted></video>
    </div>
    <!-- 小摄像头圆窗（非录制模式） -->
    <div id="camera-wrap">
      <video id="camera-video" autoplay playsinline muted></video>
      <div id="camera-border"></div>
      <span id="rec-dot"></span>
    </div>
    <!-- 文本叠加层 -->
    <div id="text-overlay">
      <div id="prompter-text">
        <span style="opacity:0.3;color:#888;">在此粘贴或编辑你的脚本…</span>
      </div>
    </div>
  </div>

  <!-- 录制叠加设置面板 -->
  <div id="overlay-settings">
    <!-- 第一行：透明度 + 位置 + 字号 -->
    <span class="setting-label">透明</span>
    <input type="range" id="overlay-opacity" min="10" max="100" step="5" value="55">
    <span class="setting-val" id="overlay-opacity-val">55%</span>
    <span class="setting-label" style="color:var(--accent);">↕ 拖拽文字框自由挪位</span>
    <span class="setting-label">字号</span>
    <input type="range" id="overlay-font" min="20" max="56" step="2" value="28">
    <span class="setting-val" id="overlay-font-val">28</span>
    <!-- 第二行：分辨率 + 帧率 + 框宽 -->
    <span class="setting-label">分辨率</span>
    <div class="pos-btns" id="camera-res-btns">
      <button data-res="720p" class="active">720p</button>
      <button data-res="1080p">1080p</button>
      <button data-res="4k">4K</button>
    </div>
    <span class="setting-label">帧率</span>
    <div class="pos-btns" id="camera-fps-btns">
      <button data-fps="24">24</button>
      <button data-fps="30" class="active">30</button>
      <button data-fps="60">60</button>
    </div>
    <span class="setting-label">框宽</span>
    <input type="range" id="overlay-width" min="50" max="100" step="5" value="75">
    <span class="setting-val" id="overlay-width-val">75%</span>
  </div>

  <!-- 控制栏 -->
  <div id="controls">
    <div class="btn-row">
      <button id="btn-script" title="编辑脚本">📝</button>
      <button id="btn-start" class="primary">🎤 开始提词</button>
      <button id="btn-camera" title="录制模式">📷</button>
      <button id="btn-record" title="开始录像" disabled>⏺</button>
      <button id="btn-mirror" title="镜像翻转">🪞</button>
      <button id="btn-reset" title="回到开头">↺</button>
    </div>
    <div class="btn-row">
      <div class="slider-group">
        <label>速度</label>
        <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
        <span class="speed-val" id="speed-val">1×</span>
      </div>
      <div class="slider-group">
        <label>字号</label>
        <input type="range" id="font-slider" min="20" max="72" step="2" value="42">
      </div>
    </div>
    <div class="btn-row">
      <div class="slider-group">
        <label>行距</label>
        <input type="range" id="line-height-slider" min="1.2" max="3" step="0.1" value="1.6">
        <span class="speed-val" id="line-height-val">1.6</span>
      </div>
      <span class="setting-label" style="min-width:24px;">字色</span>
      <div class="color-btns" id="text-color-btns">
        <button data-color="#ffffff" class="active" style="background:#fff;color:#000;">白</button>
        <button data-color="#ffcc00" style="background:#ffcc00;color:#000;">黄</button>
        <button data-color="#00ff88" style="background:#00ff88;color:#000;">绿</button>
      </div>
    </div>
  </div>

  <!-- 脚本编辑面板 -->
  <div id="editor-panel">
    <textarea id="script-editor" placeholder="在此粘贴或输入你的讲稿…&#10;&#10;每行一段，开始提词后 AI 会自动跟随你的语速滚动文案。"></textarea>
    <div class="btn-row">
      <button id="btn-editor-import">📂 导入文件</button>
      <button id="btn-editor-cancel">取消</button>
      <button id="btn-editor-apply" class="primary">✅ 确认并加载</button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".txt,.md,.text">

  <!-- 隐藏的 PiP 元素 -->
  <canvas id="pip-canvas" width="400" height="300"></canvas>
  <video id="pip-video" muted playsinline></video>
</div>

<script>
(function() {
  const $ = (sel) => document.querySelector(sel);

  // DOM
  const prompterView = $('#prompter-view');
  const prompterText = $('#prompter-text');
  const textOverlay = $('#text-overlay');
  const cameraBg = $('#camera-bg');
  const cameraVideoBg = $('#camera-video-bg');
  const cameraWrap = $('#camera-wrap');
  const cameraVideo = $('#camera-video');
  const statusDot = $('#status-dot');
  const statusLabel = $('#status-label');
  const interimTextEl = $('#interim-text');
  const positionInfo = $('#position-info');
  const scriptEditor = $('#script-editor');
  const editorPanel = $('#editor-panel');
  const speedSlider = $('#speed-slider');
  const speedVal = $('#speed-val');
  const fontSlider = $('#font-slider');
  const btnStart = $('#btn-start');
  const btnMirror = $('#btn-mirror');
  const btnCamera = $('#btn-camera');
  const btnRecord = $('#btn-record');
  const recDot = $('#rec-dot');
  const recTimer = $('#rec-timer');
  const overlaySettings = $('#overlay-settings');
  const overlayOpacitySlider = $('#overlay-opacity');
  const overlayOpacityVal = $('#overlay-opacity-val');
  const overlayFontSlider = $('#overlay-font');
  const overlayFontVal = $('#overlay-font-val');
  const overlayWidthSlider = $('#overlay-width');
  const overlayWidthVal = $('#overlay-width-val');
  const cameraResBtns = $('#camera-res-btns');
  const cameraFpsBtns = $('#camera-fps-btns');
  const pipCanvas = $('#pip-canvas');
  const pipVideo = $('#pip-video');
  const lineHeightSlider = $('#line-height-slider');
  const lineHeightVal = $('#line-height-val');
  const textColorBtns = $('#text-color-btns');
  const fileInput = $('#file-input');
  const btnEditorImport = $('#btn-editor-import');

  // ===================== 状态 =====================
  let words = [];
  let currentWordIndex = -1;
  let isRunning = false;
  let isListening = false;
  let isMirror = false;
  let isRecordingMode = false;     // 全屏相机叠加模式
  let manualSpeed = 1.0;
  let baseCPS = 4;
  let fontSize = 42;
  let lineHeight = 1.6;          // 行间距
  let textColor = '#ffffff';     // 文字颜色
  let scrollRAF = null;
  let lastScrollTime = 0;
  let speechHistory = [];
  let recognition = null;
  let lastRecognizedText = '';
  let recognitionRestartTimer = null;

  // 叠加设置
  let overlayOpacity = 0.55;
  let overlayFontSize = 28;
  let overlayWidth = 75;           // 文字框宽度百分比 (60-100)
  let overlayX = 50;               // 框中心 X 坐标 (%)
  let overlayY = 50;               // 框中心 Y 坐标 (%)

  // 相机设置
  let cameraRes = '720p';          // '720p' | '1080p' | '4k'
  let cameraFPS = 30;              // 24 | 30 | 60

  // 摄像头 & 录像
  let cameraStream = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let isRecording = false;
  let recStartTime = 0;
  let recTimerInterval = null;

  // PiP
  let pipAnimId = null;
  let pipActive = false;
  let pipOpacity = 0.85;
  let pipSize = 'medium';
  const PIP_SIZES = { small: {w:300,h:225}, medium: {w:400,h:300}, large: {w:500,h:375} };

  // ===================== 初始化 =====================
  function init() {
    const saved = loadSettings();
    if (saved.script) scriptEditor.value = saved.script;
    if (saved.fontSize) { fontSize = saved.fontSize; fontSlider.value = fontSize; }
    if (saved.lineHeight) { lineHeight = saved.lineHeight; lineHeightSlider.value = lineHeight; }
    if (saved.textColor) { textColor = saved.textColor; }
    if (saved.speed) { manualSpeed = saved.speed; speedSlider.value = manualSpeed; }
    if (saved.mirror) { isMirror = saved.mirror; }
    if (saved.overlayOpacity) { overlayOpacity = saved.overlayOpacity; overlayOpacitySlider.value = Math.round(overlayOpacity * 100); }
    if (saved.overlayFontSize) { overlayFontSize = saved.overlayFontSize; overlayFontSlider.value = overlayFontSize; }
    if (saved.overlayWidth) { overlayWidth = saved.overlayWidth; overlayWidthSlider.value = overlayWidth; }
    if (saved.overlayX !== undefined) { overlayX = saved.overlayX; }
    if (saved.overlayY !== undefined) { overlayY = saved.overlayY; }
    if (saved.cameraRes) { cameraRes = saved.cameraRes; }
    if (saved.cameraFPS) { cameraFPS = saved.cameraFPS; }

    applyFontSize();
    applyLineHeight();
    applyTextColor();
    applyMirror();
    applyOverlaySettingsUI();
    applyCameraSettingsUI();
    updateSpeedDisplay();
    updateMirrorButton();

    if (scriptEditor.value.trim()) loadScript(scriptEditor.value);

    bindEvents();
    initSpeechRecognition();
  }

  // ===================== 分词 =====================
  function tokenize(text) {
    const tokens = [];
    const regex = /[一-鿿]+|[a-zA-Z0-9]+|[^\s\w一-鿿]+/g;
    let match, idx = 0;
    while ((match = regex.exec(text)) !== null) {
      tokens.push({ text: match[0], charStart: match.index, charEnd: match.index + match[0].length, globalIndex: idx++ });
    }
    return tokens;
  }

  function loadScript(text) {
    words = tokenize(text);
    cleanWordCache = [];
    currentWordIndex = -1;
    lastRecognizedText = '';
    speechHistory = [];
    renderAllWords();
    prompterText.style.transform = 'translateY(0)';
    updatePositionInfo();
  }

  function renderAllWords() {
    if (words.length === 0) {
      prompterText.innerHTML = '<span style="opacity:0.3;color:#888;">在此粘贴或编辑你的脚本…</span>';
      return;
    }
    prompterText.innerHTML = words.map((w, i) =>
      `<span class="word" data-i="${i}">${escapeHTML(w.text)}</span>`
    ).join(' ');
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===================== 高亮 =====================
  function highlightWord(index) {
    if (index < 0 || index >= words.length) return;
    const allSpans = prompterText.querySelectorAll('.word');
    allSpans.forEach((span, i) => {
      span.classList.remove('current', 'spoken', 'pre-read');
      if (i < index) span.classList.add('spoken');
      else if (i === index) span.classList.add('current');
      else if (i <= index + 3) span.classList.add('pre-read');
    });
    currentWordIndex = index;
    updatePositionInfo();
  }

  function updatePositionInfo() {
    const total = words.length;
    const cur = currentWordIndex + 1;
    if (total > 0 && cur > 0) positionInfo.textContent = `${cur}/${total}`;
    else if (total > 0) positionInfo.textContent = `共 ${total} 词`;
    else positionInfo.textContent = '';
  }

  // ===================== 滚动 =====================
  function scrollToWord(index) {
    if (index < 0 || index >= words.length) return;
    const allSpans = prompterText.querySelectorAll('.word');
    if (!allSpans[index]) return;
    const spanRect = allSpans[index].getBoundingClientRect();
    const viewRect = prompterView.getBoundingClientRect();
    const targetTop = viewRect.top + viewRect.height * 0.35;
    const offset = spanRect.top - targetTop;
    const currentTransform = getCurrentTranslateY();
    let newTransform = currentTransform - offset;
    const textHeight = prompterText.scrollHeight;
    const viewHeight = viewRect.height;
    const maxScroll = 0;
    const minScroll = -(textHeight - viewHeight * 0.5);
    newTransform = Math.max(minScroll, Math.min(maxScroll, newTransform));
    prompterText.style.transform = `translateY(${newTransform}px)`;
    lastScrollTime = performance.now();
  }

  function getCurrentTranslateY() {
    const t = prompterText.style.transform;
    const m = t.match(/translateY\(([-\d.]+)px\)/);
    return m ? parseFloat(m[1]) : 0;
  }

  function manualScrollLoop(timestamp) {
    if (!isRunning) { scrollRAF = null; return; }
    if (words.length > 0 && currentWordIndex >= 0) {
      const elapsed = (timestamp - lastScrollTime) / 1000;
      const interval = isListening ? 0.5 : 0.05;
      if (elapsed > interval) {
        const cps = baseCPS * manualSpeed;
        const advance = Math.max(0.5, cps * elapsed / 3);
        const targetIdx = Math.min(words.length - 1, Math.max(currentWordIndex, Math.floor(currentWordIndex + advance)));
        if (targetIdx > currentWordIndex) {
          highlightWord(targetIdx);
          scrollToWord(targetIdx);
          lastScrollTime = timestamp;
        }
      }
      if (currentWordIndex >= 0) {
        const allSpans = prompterText.querySelectorAll('.word');
        if (allSpans[currentWordIndex]) scrollToWord(currentWordIndex);
      }
    }
    scrollRAF = requestAnimationFrame(manualScrollLoop);
  }

  // ===================== 语音识别 =====================
  function initSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { statusLabel.textContent = '⚠️ 浏览器不支持语音'; return; }
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 3;

    recognition.onstart = () => {
      isListening = true;
      statusDot.classList.add('listening');
      statusDot.classList.remove('speaking');
      statusLabel.textContent = '🎤 正在听…';
      updateStartButton();
    };
    recognition.onend = () => {
      isListening = false;
      statusDot.classList.remove('listening', 'speaking');
      if (isRunning) {
        statusLabel.textContent = '🔄 重连中…';
        if (recognitionRestartTimer) clearTimeout(recognitionRestartTimer);
        recognitionRestartTimer = setTimeout(() => {
          if (isRunning && !isListening) try { recognition.start(); } catch(e) {}
        }, 300);
      } else { statusLabel.textContent = '就绪'; }
      updateStartButton();
    };
    recognition.onerror = (e) => {
      if (e.error === 'not-allowed') { statusLabel.textContent = '❌ 麦克风权限被拒'; isListening = false; updateStartButton(); }
      else if (e.error === 'no-speech') { if (isRunning) statusLabel.textContent = '🎤 等待语音…'; }
      else { statusLabel.textContent = `⚠️ ${e.error}`; }
    };
    recognition.onaudiostart = () => { statusDot.classList.add('speaking','listening'); statusLabel.textContent = '🔊 检测到语音'; };
    recognition.onaudioend = () => { statusDot.classList.remove('speaking'); };

    recognition.onresult = (event) => {
      let interim = '', finalText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
        else interim += event.results[i][0].transcript;
      }
      interimTextEl.textContent = interim ? `"${interim}"` : '';
      if (finalText) { lastRecognizedText += finalText; matchAndScroll(lastRecognizedText); }
      if (interim && words.length > 0) matchAndScroll(lastRecognizedText + interim);
    };
  }

  let cleanWordCache = [];
  function getCleanWord(idx) {
    if (cleanWordCache[idx] !== undefined) return cleanWordCache[idx];
    const c = words[idx].text.replace(/[^一-鿿㐀-䶿a-zA-Z0-9]/g, '').toLowerCase();
    cleanWordCache[idx] = c;
    return c;
  }

  function matchAndScroll(recognizedText) {
    if (words.length === 0) return;
    const clean = recognizedText.replace(/[^一-鿿㐀-䶿a-zA-Z0-9]/g, '').toLowerCase();
    if (clean.length < 3) return;
    const sS = Math.max(0, currentWordIndex - 5), sE = Math.min(words.length, currentWordIndex + 35);
    let bestIdx = currentWordIndex, bestScore = 0;
    for (let i = sS; i < sE; i++) {
      let candidate = '', j = i;
      while (j < sE && candidate.length < clean.length + 15) candidate += getCleanWord(j++);
      const score = matchScore(clean, candidate);
      const bias = i >= currentWordIndex ? 1.0 : 0.3;
      if (score * bias > bestScore) { bestScore = score * bias; bestIdx = i; }
    }
    if (bestScore >= 2 && bestIdx >= currentWordIndex) {
      highlightWord(bestIdx);
      scrollToWord(bestIdx);
      updateSpeechSpeed(bestIdx);
    }
  }

  function matchScore(short, long) {
    if (!short || !long) return 0;
    let hits = 0;
    for (let i = 0; i <= short.length - 3; i++) if (long.includes(short.substring(i, i+3))) hits++;
    if (long.includes(short)) hits += short.length;
    return hits;
  }

  function updateSpeechSpeed(wordIdx) {
    const charPos = wordIdx >= 0 && wordIdx < words.length ? words[wordIdx].charStart : wordIdx;
    const now = performance.now();
    speechHistory.push({ time: now, charPos });
    speechHistory = speechHistory.filter(h => h.time > now - 12000);
    if (speechHistory.length >= 4) {
      const first = speechHistory[0], last = speechHistory[speechHistory.length - 1];
      const dS = (last.time - first.time) / 1000, dC = last.charPos - first.charPos;
      if (dS > 1.5 && dC > 0) {
        userSpeechCPS = dC / dS;
        baseCPS = baseCPS * 0.7 + userSpeechCPS * 0.3;
        statusLabel.textContent = `🎤 语速 ≈${Math.round(userSpeechCPS)}字/秒`;
      }
    }
  }

  // ===================== 控制 =====================
  function start() {
    if (words.length === 0) { alert('请先在编辑面板中粘贴脚本内容'); openEditor(); return; }
    isRunning = true;
    lastScrollTime = performance.now();
    speechHistory = [];
    lastRecognizedText = '';
    if (currentWordIndex < 0) { highlightWord(0); scrollToWord(0); }
    if (recognition && !isListening) try { recognition.start(); } catch(e) {}
    if (!scrollRAF) scrollRAF = requestAnimationFrame(manualScrollLoop);
    updateStartButton();
    editorPanel.classList.remove('open');
  }

  function stop() {
    isRunning = false;
    if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
    if (recognition && isListening) try { recognition.stop(); } catch(e) {}
    isListening = false;
    statusDot.classList.remove('listening', 'speaking');
    statusLabel.textContent = '已暂停';
    interimTextEl.textContent = '';
    if (recognitionRestartTimer) clearTimeout(recognitionRestartTimer);
    updateStartButton();
  }

  function toggleRunning() { isRunning ? stop() : start(); }

  function resetPosition() {
    stop();
    currentWordIndex = -1;
    prompterText.style.transform = 'translateY(0)';
    lastRecognizedText = '';
    speechHistory = [];
    interimTextEl.textContent = '';
    renderAllWords();
    updatePositionInfo();
    statusLabel.textContent = '已回到开头';
    updateStartButton();
  }

  function toggleMirror() { isMirror = !isMirror; applyMirror(); updateMirrorButton(); saveSettings(); }
  function applyMirror() { prompterView.classList.toggle('mirror', isMirror); }
  function updateMirrorButton() {
    btnMirror.textContent = isMirror ? '🪞✓' : '🪞';
    btnMirror.classList.toggle('active', isMirror);
  }
  function updateStartButton() {
    if (isRunning) { btnStart.textContent = '⏸ 暂停'; btnStart.classList.add('danger'); btnStart.classList.remove('primary'); }
    else { btnStart.textContent = recognition ? '🎤 开始提词' : '▶ 开始滚动'; btnStart.classList.add('primary'); btnStart.classList.remove('danger'); }
  }
  function updateSpeedDisplay() { speedVal.textContent = manualSpeed.toFixed(1) + '×'; }
  function applyFontSize() { prompterText.style.setProperty('--font-size', fontSize + 'px'); }
  function applyLineHeight() {
    prompterText.style.setProperty('--line-height', lineHeight);
    lineHeightSlider.value = lineHeight;
    lineHeightVal.textContent = lineHeight;
  }
  function applyTextColor() {
    prompterText.style.color = textColor;
    // 更新已读词的 dim color
    prompterText.style.setProperty('--text', textColor);
    // 高亮当前词颜色按钮
    textColorBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.color === textColor));
  }

  // ===================== 叠加设置 =====================
  function applyOverlaySettingsUI() {
    overlayOpacitySlider.value = Math.round(overlayOpacity * 100);
    overlayOpacityVal.textContent = overlayOpacitySlider.value + '%';
    overlayFontSlider.value = overlayFontSize;
    overlayFontVal.textContent = overlayFontSize;
    overlayWidthSlider.value = overlayWidth;
    overlayWidthVal.textContent = overlayWidth + '%';
    applyOverlayBg();
    applyOverlayPos();
    applyOverlayWidth();
  }

  function applyCameraSettingsUI() {
    cameraResBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.res === cameraRes));
    cameraFpsBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.fps === String(cameraFPS)));
  }

  function applyOverlayBg() {
    if (isRecordingMode) {
      prompterText.style.setProperty('--overlay-bg', `rgba(0,0,0,${overlayOpacity})`);
    }
  }

  function applyOverlayPos() {
    if (!isRecordingMode) {
      textOverlay.style.left = '';
      textOverlay.style.top = '';
      textOverlay.style.transform = '';
      return;
    }
    // 将百分比坐标转换为 left/top，用 transform 居中
    textOverlay.style.left = overlayX + '%';
    textOverlay.style.top = overlayY + '%';
    textOverlay.style.transform = 'translate(-50%, -50%)';
  }

  function applyOverlayWidth() {
    if (isRecordingMode) {
      textOverlay.style.width = overlayWidth + '%';
    } else {
      textOverlay.style.width = '100%';
    }
  }

  // ===================== 录制模式（全屏相机 + 文字叠加） =====================
  async function toggleRecordingMode() {
    if (isRecordingMode) {
      exitRecordingMode();
    } else {
      await enterRecordingMode();
    }
  }

  // 分辨率 → 竖屏 9:16 像素
  const RES_MAP = {
    '720p':  { w: 720, h: 1280 },
    '1080p': { w: 1080, h: 1920 },
    '4k':    { w: 2160, h: 3840 }
  };

  async function enterRecordingMode() {
    try {
      // 如果已有摄像头但分辨率/帧率变了，先释放
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }

      // 用当前设置的分辨率 + 帧率获取摄像头
      const res = RES_MAP[cameraRes] || RES_MAP['720p'];
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: res.w },
          height: { ideal: res.h },
          frameRate: { ideal: cameraFPS }
        },
        audio: false
      });

      // 同时赋给两个 video 元素
      cameraVideoBg.srcObject = cameraStream;
      cameraVideo.srcObject = cameraStream;

      isRecordingMode = true;
      document.body.classList.add('recording-fullscreen');
      prompterView.classList.add('recording');
      textOverlay.classList.add('draggable');
      cameraWrap.classList.remove('on');
      prompterView.classList.remove('has-camera');
      overlaySettings.classList.add('on');
      btnCamera.classList.add('active');
      btnRecord.disabled = false;

      applyOverlayBg();
      applyOverlayPos();
      applyOverlayWidth();

      // 录制模式下用叠加字号
      if (overlayFontSize !== fontSize) {
        prompterText.style.setProperty('--font-size', overlayFontSize + 'px');
      }

      const resLabel = cameraRes === '4k' ? '4K' : cameraRes;
      statusLabel.textContent = `📷 录制模式 — ${resLabel} ${cameraFPS}fps`;

    } catch (err) {
      console.warn('摄像头错误:', err);
      if (err.name === 'NotAllowedError') {
        alert('请在 Safari 设置中允许摄像头权限，然后刷新页面');
      } else {
        alert('摄像头不可用: ' + err.message);
      }
    }
  }

  function exitRecordingMode() {
    isRecordingMode = false;
    if (isRecording) stopRecording();

    document.body.classList.remove('recording-fullscreen');
    prompterView.classList.remove('recording');
    textOverlay.classList.remove('draggable', 'dragging');
    cameraVideoBg.srcObject = null;
    cameraVideo.srcObject = null;
    overlaySettings.classList.remove('on');
    btnCamera.classList.remove('active');
    btnRecord.disabled = true;
    btnRecord.textContent = '⏺';
    btnRecord.classList.remove('danger');
    cameraWrap.classList.remove('on');
    prompterView.classList.remove('has-camera');

    // 释放摄像头
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }

    // 恢复默认字号、宽度、位置
    prompterText.style.setProperty('--font-size', fontSize + 'px');
    textOverlay.style.width = '100%';
    textOverlay.style.left = '';
    textOverlay.style.top = '';
    textOverlay.style.transform = '';
    textOverlay.style.alignItems = 'center';
    textOverlay.style.justifyContent = 'center';

    statusLabel.textContent = '录制模式已关闭';
  }

  // ===================== 录像 =====================
  async function toggleRecording() {
    if (isRecording) stopRecording();
    else await startRecording();
  }

  async function startRecording() {
    if (!cameraStream) return;
    let recStream = cameraStream;
    try {
      const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioStream.getAudioTracks().forEach(t => recStream.addTrack(t));
    } catch(e) {}

    const mime = MediaRecorder.isTypeSupported('video/mp4;codecs=avc1') ? 'video/mp4;codecs=avc1'
      : MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9'
      : 'video/webm';

    recordedChunks = [];
    // 使用用户设置的帧率（如果浏览器支持的话）
    const recOpts = { mimeType: mime };
    if (MediaRecorder.isTypeSupported(mime)) {
      // 部分浏览器不支持 frameRate 参数，忽略即可
      try {
        recOpts.videoBitsPerSecond = cameraRes === '4k' ? 20000000 : cameraRes === '1080p' ? 8000000 : 4000000;
      } catch(e) {}
    }
    mediaRecorder = new MediaRecorder(recStream, recOpts);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `prompter-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.mp4`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      recordedChunks = [];
    };

    mediaRecorder.start();
    isRecording = true;
    recStartTime = Date.now();
    recDot.classList.add('active');
    btnRecord.textContent = '⏹';
    btnRecord.classList.add('danger');
    recTimer.classList.add('show');
    updateRecTimer();
    recTimerInterval = setInterval(updateRecTimer, 1000);
    statusLabel.textContent = '🔴 录像中…';
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    recDot.classList.remove('active');
    btnRecord.textContent = '⏺';
    btnRecord.classList.remove('danger');
    if (recTimerInterval) clearInterval(recTimerInterval);
    recTimer.classList.remove('show');
    statusLabel.textContent = '✅ 录像已保存';
  }

  function updateRecTimer() {
    const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
    const s = (elapsed % 60).toString().padStart(2,'0');
    recTimer.textContent = `${m}:${s}`;
  }

  // ===================== 编辑器 =====================
  function openEditor() { if (isRunning) stop(); editorPanel.classList.add('open'); scriptEditor.focus(); }
  function closeEditor() { editorPanel.classList.remove('open'); }
  function applyEditorScript() {
    const text = scriptEditor.value.trim();
    if (text) { loadScript(text); currentWordIndex = -1; prompterText.style.transform = 'translateY(0)'; saveSettings(); statusLabel.textContent = '脚本已加载 ✓'; updatePositionInfo(); }
    closeEditor();
  }

  // ===================== PiP（桌面端备用） =====================
  function renderPipFrame() {
    const ctx = pipCanvas.getContext('2d');
    const W = pipCanvas.width, H = pipCanvas.height;
    ctx.fillStyle = `rgba(0,0,0,${pipOpacity * 0.85})`;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = pipOpacity;
    if (words.length > 0 && currentWordIndex >= 0) {
      const curWord = words[currentWordIndex];
      ctx.font = `bold ${Math.round(W*0.08)}px "PingFang SC", sans-serif`;
      ctx.fillStyle = '#ffcc00';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(255,204,0,0.6)'; ctx.shadowBlur = 12;
      ctx.fillText(curWord.text, W/2, H/2 - 10);
      ctx.shadowBlur = 0;
      let next = '';
      for (let i = currentWordIndex+1; i < Math.min(words.length, currentWordIndex+6); i++) next += words[i].text;
      if (next) {
        ctx.font = `${Math.round(W*0.05)}px "PingFang SC", sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(next.slice(0,18), W/2, H/2 + 30);
      }
    } else {
      ctx.font = `bold ${Math.round(W*0.06)}px "PingFang SC", sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.textAlign = 'center';
      ctx.fillText('等待开始…', W/2, H/2);
    }
    ctx.globalAlpha = 1;
  }

  function startPipLoop() {
    function frame() { if (!pipActive) { pipAnimId = null; return; } renderPipFrame(); pipAnimId = requestAnimationFrame(frame); }
    pipAnimId = requestAnimationFrame(frame);
  }

  async function togglePiP() {
    if (pipActive) {
      pipActive = false; if (pipAnimId) cancelAnimationFrame(pipAnimId);
      pipVideo.srcObject = null;
      if (document.pictureInPictureElement) await document.exitPictureInPicture().catch(()=>{});
      statusLabel.textContent = 'PiP 已关闭';
      return;
    }
    const sz = PIP_SIZES[pipSize] || PIP_SIZES.medium;
    pipCanvas.width = sz.w; pipCanvas.height = sz.h;
    renderPipFrame();
    const stream = pipCanvas.captureStream(30);
    pipVideo.srcObject = stream;
    pipVideo.muted = true; pipVideo.playsInline = true;
    pipVideo.style.cssText = 'position:fixed;bottom:0;right:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1';
    document.body.appendChild(pipVideo);
    await pipVideo.play();
    pipActive = true; startPipLoop();
    try {
      if (pipVideo.webkitSetPresentationMode) pipVideo.webkitSetPresentationMode('picture-in-picture');
      else if (pipVideo.requestPictureInPicture && document.pictureInPictureEnabled) await pipVideo.requestPictureInPicture();
      else { pipActive = false; if (pipAnimId) cancelAnimationFrame(pipAnimId); alert('浏览器不支持画中画。请使用 📷 录制模式。'); return; }
      statusLabel.textContent = '🖼 PiP 已开启';
    } catch(e) { pipActive = false; if (pipAnimId) cancelAnimationFrame(pipAnimId); alert('PiP 失败，请使用 📷 录制模式'); }
  }

  // ===================== 设置持久化 =====================
  function saveSettings() {
    const s = { script: scriptEditor.value, fontSize, lineHeight, textColor, speed: manualSpeed, mirror: isMirror, overlayOpacity, overlayFontSize, overlayWidth, overlayX, overlayY, cameraRes, cameraFPS };
    try { localStorage.setItem('teleprompter-settings', JSON.stringify(s)); } catch(e) {}
  }
  function loadSettings() {
    try { const r = localStorage.getItem('teleprompter-settings'); if (r) return JSON.parse(r); } catch(e) {}
    return {};
  }

  // ===================== 事件绑定 =====================
  function bindEvents() {
    btnStart.addEventListener('click', toggleRunning);
    btnMirror.addEventListener('click', toggleMirror);
    btnCamera.addEventListener('click', toggleRecordingMode);
    btnRecord.addEventListener('click', toggleRecording);
    $('#btn-reset').addEventListener('click', resetPosition);
    $('#btn-script').addEventListener('click', openEditor);
    $('#btn-editor-cancel').addEventListener('click', closeEditor);
    $('#btn-editor-apply').addEventListener('click', applyEditorScript);
    // 文件导入
    btnEditorImport.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        scriptEditor.value = reader.result;
        statusLabel.textContent = `📂 已导入: ${file.name}`;
      };
      reader.onerror = () => alert('文件读取失败');
      reader.readAsText(file);
      fileInput.value = ''; // 允许重复选同一个文件
    });

    // 速度
    speedSlider.addEventListener('input', () => { manualSpeed = parseFloat(speedSlider.value); updateSpeedDisplay(); saveSettings(); });
    // 字号
    fontSlider.addEventListener('input', () => { fontSize = parseInt(fontSlider.value); if (!isRecordingMode) applyFontSize(); saveSettings(); });
    // 行间距
    lineHeightSlider.addEventListener('input', () => { lineHeight = parseFloat(lineHeightSlider.value); applyLineHeight(); saveSettings(); });
    // 文字颜色
    textColorBtns.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || !btn.dataset.color) return;
      textColor = btn.dataset.color;
      applyTextColor();
      saveSettings();
    });

    // 叠加透明度
    overlayOpacitySlider.addEventListener('input', () => {
      overlayOpacity = parseInt(overlayOpacitySlider.value) / 100;
      overlayOpacityVal.textContent = overlayOpacitySlider.value + '%';
      applyOverlayBg();
      saveSettings();
    });

    // 叠加字号
    overlayFontSlider.addEventListener('input', () => {
      overlayFontSize = parseInt(overlayFontSlider.value);
      overlayFontVal.textContent = overlayFontSize;
      if (isRecordingMode) prompterText.style.setProperty('--font-size', overlayFontSize + 'px');
      saveSettings();
    });

    // ========= 文字框自由拖拽 =========
    let dragInfo = null; // { startX, startY, startOverlayX, startOverlayY }

    textOverlay.addEventListener('touchstart', (e) => {
      if (!isRecordingMode) return;
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      dragInfo = {
        startX: t.clientX,
        startY: t.clientY,
        startOverlayX: overlayX,
        startOverlayY: overlayY
      };
      textOverlay.classList.add('dragging');
    }, { passive: false });

    textOverlay.addEventListener('touchmove', (e) => {
      if (!dragInfo || !isRecordingMode) return;
      e.preventDefault();
      const t = e.touches[0];
      const viewRect = prompterView.getBoundingClientRect();
      const dx = ((t.clientX - dragInfo.startX) / viewRect.width) * 100;
      const dy = ((t.clientY - dragInfo.startY) / viewRect.height) * 100;
      overlayX = Math.max(0, Math.min(100, dragInfo.startOverlayX + dx));
      overlayY = Math.max(0, Math.min(100, dragInfo.startOverlayY + dy));
      applyOverlayPos();
    }, { passive: false });

    textOverlay.addEventListener('touchend', () => {
      if (!dragInfo) return;
      dragInfo = null;
      textOverlay.classList.remove('dragging');
      saveSettings();
    });

    // 鼠标拖拽（桌面调试）
    textOverlay.addEventListener('mousedown', (e) => {
      if (!isRecordingMode) return;
      dragInfo = {
        startX: e.clientX,
        startY: e.clientY,
        startOverlayX: overlayX,
        startOverlayY: overlayY
      };
      textOverlay.classList.add('dragging');
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragInfo || !isRecordingMode) return;
      const viewRect = prompterView.getBoundingClientRect();
      const dx = ((e.clientX - dragInfo.startX) / viewRect.width) * 100;
      const dy = ((e.clientY - dragInfo.startY) / viewRect.height) * 100;
      overlayX = Math.max(0, Math.min(100, dragInfo.startOverlayX + dx));
      overlayY = Math.max(0, Math.min(100, dragInfo.startOverlayY + dy));
      applyOverlayPos();
    });

    window.addEventListener('mouseup', () => {
      if (!dragInfo) return;
      dragInfo = null;
      textOverlay.classList.remove('dragging');
      saveSettings();
    });

    // 分辨率
    cameraResBtns.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || !btn.dataset.res) return;
      const newRes = btn.dataset.res;
      if (newRes === cameraRes) return;
      cameraRes = newRes;
      cameraResBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.res === cameraRes));
      saveSettings();
      // 如果正在录制模式，重启摄像头
      if (isRecordingMode) {
        exitRecordingMode();
        setTimeout(() => enterRecordingMode(), 150);
      }
    });

    // 帧率
    cameraFpsBtns.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || !btn.dataset.fps) return;
      const newFPS = parseInt(btn.dataset.fps);
      if (newFPS === cameraFPS) return;
      cameraFPS = newFPS;
      cameraFpsBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.fps === String(cameraFPS)));
      saveSettings();
      if (isRecordingMode) {
        exitRecordingMode();
        setTimeout(() => enterRecordingMode(), 150);
      }
    });

    // 叠加框宽
    overlayWidthSlider.addEventListener('input', () => {
      overlayWidth = parseInt(overlayWidthSlider.value);
      overlayWidthVal.textContent = overlayWidth + '%';
      applyOverlayWidth();
      saveSettings();
    });

    // 键盘
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case ' ': e.preventDefault(); toggleRunning(); break;
        case 'Escape': if (editorPanel.classList.contains('open')) closeEditor(); else if (isRunning) stop(); break;
        case 'ArrowUp': e.preventDefault(); manualSpeed = Math.min(3, manualSpeed + 0.1); speedSlider.value = manualSpeed; updateSpeedDisplay(); saveSettings(); break;
        case 'ArrowDown': e.preventDefault(); manualSpeed = Math.max(0.5, manualSpeed - 0.1); speedSlider.value = manualSpeed; updateSpeedDisplay(); saveSettings(); break;
        case 'm': if (!e.ctrlKey && !e.metaKey) toggleMirror(); break;
        case 'f': if (!e.ctrlKey && !e.metaKey && !editorPanel.classList.contains('open')) { e.preventDefault(); togglePiP(); } break;
        case 'c': if (!e.ctrlKey && !e.metaKey && !editorPanel.classList.contains('open')) { e.preventDefault(); toggleRecordingMode(); } break;
      }
    });

    // 触摸双指调速度
    let tsY = 0, tsS = 0;
    prompterView.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { tsY = e.touches[0].clientY; tsS = manualSpeed; } }, { passive: true });
    prompterView.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && tsY > 0) {
        const dY = tsY - e.touches[0].clientY;
        manualSpeed = Math.round(Math.max(0.5, Math.min(3, tsS + dY / 200)) * 10) / 10;
        speedSlider.value = manualSpeed; updateSpeedDisplay();
      }
    }, { passive: true });
    prompterView.addEventListener('touchend', () => { if (tsY > 0) { saveSettings(); tsY = 0; } });

    window.addEventListener('beforeunload', () => { saveSettings(); if (isRecordingMode) exitRecordingMode(); });
    window.addEventListener('pagehide', () => { saveSettings(); if (isRecordingMode) exitRecordingMode(); });

    pipVideo.addEventListener('leavepictureinpicture', () => { pipActive = false; if (pipAnimId) cancelAnimationFrame(pipAnimId); });
  }

  // ===================== 启动 =====================
  init();

  console.log('📺 智能提词器已就绪');
  console.log('  - 空格键：开始/暂停  |  上下箭头：调整速度');
  console.log('  - M：镜像翻转  |  C：录制模式  |  F：画中画');
  console.log('  - 📷 录制模式：全屏相机 + 文字叠加（可调透明度/位置/字号）');
  console.log('  - ⏺ 内录视频（相机画面不含叠加文字）');
  if (window.SpeechRecognition || window.webkitSpeechRecognition) console.log('  - 🎤 语音识别可用');
  else console.log('  - ⚠️ 语音识别不可用（需 HTTPS）');

  // PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => console.log('📦 SW 已注册:', reg.scope))
        .catch(err => console.warn('SW 注册失败:', err));
    });
  }
})();
</script>
</body>
</html>
